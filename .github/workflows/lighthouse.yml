name: Lighthouse

# Audit accessibilite (WCAG) sur main, contre le build Angular servi statiquement.
#
# Squelette actuel (bootstrap) : seule la route placeholder (features/home) existe et est
# auditée ici (.lighthouserc.noauth.json, http://localhost:4200/) — aucun appel backend.
# pivot-core n'est donc pas démarré (voir e2e.yml pour le détail complet du root-cause : la
# route placeholder n'exerce aucune requête HTTP, et le pull GHCR cross-repo de l'image privée
# pivot-core était de toute façon refusé, "Manage Actions access" du package non accordé à ce
# repo). À réintroduire dès qu'une vraie feature nécessite l'audit d'une page authentifiée
# (.lighthouserc.json, profil "auth", pour l'instant non invoqué par ce workflow).

on:
  push:
    branches: [main]
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse — Accessibilité
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node + npm
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: npm ci

      - name: Build Angular (CI config)
        run: npm run build -- --configuration ci

      - name: Serve Angular build
        # Projet Angular = "frontend" → dist/frontend/browser (pas dist/pivot-agilite-ui).
        run: npx --yes serve dist/frontend/browser -p 4200 --single &

      - name: Wait for frontend
        run: curl --retry 15 --retry-delay 1 --retry-connrefused --silent --output /dev/null http://localhost:4200/

      - name: Install Chrome
        uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce # v1
        id: setup-chrome

      - name: Run Lighthouse CI (placeholder route)
        env:
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          set +e
          # IMPORTANT : le binaire Lighthouse CI vient de @lhci/cli (pinné). `npx lhci`
          # SANS scope installe un package npm tiers homonyme ("lhci", non Lighthouse) —
          # il s'exécutait en no-op (exit 0) sans produire d'audit ni de rapport.
          # autorun = collect + assert + upload(filesystem) → lighthouse-reports/{public,auth}/
          # (HTML + *.report.json + manifest.json), exploités par le résumé et l'artifact.
          LHCI="npx --yes @lhci/cli@0.15.1"
          $LHCI autorun --config=.lighthouserc.noauth.json
          RC_PUBLIC=$?
          echo "public rc=$RC_PUBLIC"
          [ "$RC_PUBLIC" -eq 0 ]

      - name: Lighthouse — résumé agrégé
        if: always()
        run: |
          {
            echo "## Lighthouse — Accessibilité PIVOT-AGILITE-UI"
            echo ""
            echo "| Page | A11y | Perf | SEO | Bonnes pratiques |"
            echo "|------|------|------|-----|------------------|"
            # manifest.json (un par dossier public/auth) = source fiable des scores agrégés
            # par URL (run représentatif). Plus robuste que parser les LHR bruts.
            for m in $(find lighthouse-reports -name "manifest.json" 2>/dev/null); do
              jq -r '.[] | select(.isRepresentativeRun)
                | "| \(.url) "
                + "| \((.summary.accessibility * 100) | round)% "
                + "| \((.summary.performance * 100) | round)% "
                + "| \((.summary.seo * 100) | round)% "
                + "| \((.summary["best-practices"] * 100) | round)% |"' "$m"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lighthouse-report
          path: lighthouse-reports/
          retention-days: 7
