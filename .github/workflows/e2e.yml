name: E2E

# Tests E2E Playwright contre le build Angular servi statiquement (dist/frontend/browser).
#
# Squelette actuel (bootstrap) : une seule route placeholder (features/home,
# "PIVOT Agilité"), aucun appel HTTP au backend (environment.ts pointe vers
# pivot-agilite-core :8082, jamais appelé par ce squelette). pivot-core (ce workflow le
# démarrait auparavant en conteneur Docker via l'image GHCR) n'est donc PAS nécessaire ici
# et n'est plus démarré :
# - il n'était de toute façon exercé par aucune requête réelle du squelette (page
#   placeholder pure), et son URL (:8080) ne correspond même pas à environment.ts (:8082,
#   pivot-agilite-core) ;
# - le pull `docker run` de l'image privée `ghcr.io/pivot-platform/pivot-core/pivot-core`
#   échouait de toute façon avec "denied" : le package GHCR de pivot-core n'a jamais accordé
#   l'accès Actions ("Manage Actions access", réglage web UI uniquement, pas d'API) au repo
#   pivot-agilite-ui — contrairement à pivot-ui, déjà autorisé. Root-cause CI réelle
#   documentée ici (runs 28828158251 / 28828158230, 2026-07-06).
#
# À réintroduire — pivot-agilite-core (:8082), jamais pivot-core (:8080) — dès qu'une vraie
# feature de ce module appelle le backend ; et, dans tous les cas, seulement après que le
# mainteneur ait accordé l'accès Actions au package GHCR concerné pour ce repo.
#
# Bloquant : un test KO fait echouer le workflow (required status check).

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E - Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Angular (CI config)
        run: npm run build -- --configuration ci

      - name: Serve Angular build
        # Projet Angular = "frontend" (pas d'outputPath custom dans angular.json) → dist/frontend/browser.
        run: npx --yes serve dist/frontend/browser -p 4200 --single &

      - name: Run Playwright
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
