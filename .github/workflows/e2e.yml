name: E2E

# Tests E2E Playwright contre le build Angular servi statiquement (dist/frontend/browser).
#
# Historique (bootstrap) : à l'origine une seule route placeholder (features/home), aucun
# appel HTTP au backend — pivot-core (que ce workflow démarrait auparavant en conteneur
# Docker via l'image GHCR) avait été retiré car : (a) non exercé par la page placeholder,
# (b) son URL (:8080) ne correspondait même pas à environment.ts (:8082, pivot-agilite-core),
# (c) le pull `docker run` de l'image privée `ghcr.io/pivot-platform/pivot-core/pivot-core`
# échouait avec "denied" (accès Actions cross-repo jamais accordé). Root-cause CI réelle
# documentée ici (runs 28828158251 / 28828158230, 2026-07-06).
#
# Depuis US20.1.1 (création de session de rétrospective, `features/retro/create-session`) :
# une vraie feature appelle bien le backend (`POST /api/agilite/retro/sessions`). Un
# conteneur `pivot-agilite-core` réel n'est **toujours pas** démarré ici : ce backend n'a
# publié aucune image GHCR à ce jour (pas de release — à la différence de
# `pivot-collaboratif-core`, dont `pivot-collaboratif-ui/e2e.yml` démarre un conteneur réel).
# Les specs `e2e/retro-*.e2e.spec.ts` stubbent donc la réponse backend au niveau réseau via
# `page.route` (Playwright) — ça n'a donc pas besoin d'un backend démarré ici, seulement du
# build Angular statique déjà en place. À réintroduire un vrai `pivot-agilite-core` (:8082,
# jamais pivot-core :8080) — sur le modèle de `pivot-collaboratif-ui/e2e.yml` — dès qu'une
# image GHCR est publiée pour ce backend et que l'accès Actions cross-repo est accordé.
#
# Bloquant : un test KO fait echouer le workflow (required status check).

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E - Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Angular (CI config)
        run: npm run build -- --configuration ci

      - name: Serve Angular build
        # Projet Angular = "frontend" (pas d'outputPath custom dans angular.json) → dist/frontend/browser.
        run: npx --yes serve dist/frontend/browser -p 4200 --single &

      - name: Run Playwright
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
